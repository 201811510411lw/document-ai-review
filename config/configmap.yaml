apiVersion: v1
kind: ConfigMap
metadata:
  name: document-ai-review-config
  namespace: ds-api
  labels:
    app: document-ai-review
data:
  PORT: "8000"
  DOCUMENT_AI_REVIEW_DEBUG: "false"
  WEB_CONSOLE_BASE_URL: "https://ai-review.lsym.cn"
  WECOM_REDIRECT_URI: "https://ai-review.lsym.cn/api/v1/auth/sso/callback?provider=wecom"
  WECOM_NOTIFICATION_BASE_URL: "https://ai-review.lsym.cn"
  WEB_CONSOLE_AUTH_TOKEN_TTL_SECONDS: "28800"
  BUSINESS_LICENSE_VISION_PROVIDER: "openai"
  BUSINESS_LICENSE_SKILL_REVIEW_PROVIDER: "openai"
  FOOD_LICENSE_SKILL_REVIEW_PROVIDER: "fake"
  QC_DOCUMENT_SKILL_REVIEW_PROVIDER: "fake"
  ALIYUN_OCR_IMAGE_FIELD: "image"
  ALIYUN_OCR_TIMEOUT_SECONDS: "30"
